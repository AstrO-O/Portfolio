<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta property="og:description" content="Notes on sound engineering, web development, computers, and whatever else is on my mind." />
  <meta property="og:url" content="https://simonsunuwar.com.np/blog.html" />
  <meta property="og:image" content="https://simonsunuwar.com.np/Images/IMG.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Blog — Simon Sunuwar" />
  <meta name="twitter:description" content="Notes on sound engineering, web development, computers, and whatever else is on my mind." />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Simon Sunuwar's Blog",
    "url": "https://blog.simonsunuwar.com.np/",
    "description": "Notes on sound engineering, web development, computers, and life in Nepal.",
    "author": {
      "@type": "Person",
      "name": "Simon Sunuwar",
      "url": "https://simonsunuwar.com.np"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="IMG/IMG.jpg">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --text: #1c1b19;
      --muted: #78766f;
      --accent: #1a3a2a;
      --accent-mid: #2e6b4a;
      --accent-light: #e6f0eb;
      --border: #dedad2;
      --white: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #111210;
      --text: #e8e5df;
      --muted: #8a8880;
      --accent: #2e6b4a;
      --accent-mid: #4d9e72;
      --accent-light: #1a2e22;
      --border: #2a2926;
      --white: #1a1916;
    }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.25s, color 0.25s;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      background: rgba(245, 243, 239, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      transition: background 0.25s, border-color 0.25s;
    }

    [data-theme="dark"] nav {
      background: rgba(17, 18, 16, 0.9);
    }

    .nav-back {
      display: flex; align-items: center; gap: 0.5rem;
      text-decoration: none; color: var(--muted); font-size: 0.875rem; transition: color 0.18s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-logo { font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: var(--text); text-decoration: none; }

    /* Dark mode toggle */
    .theme-toggle {
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.25s, border-color 0.25s;
    }

    .theme-toggle-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .theme-toggle-icon.active {
      background: var(--white);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .theme-toggle-icon svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent-mid);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent-mid); font-weight: 500; margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    h1 em { font-style: italic; color: var(--accent-mid); }

    .desc {
      font-size: 1rem; color: var(--muted); font-weight: 300;
      max-width: 400px; line-height: 1.7; margin-bottom: 2rem;
    }

    .topics {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.4rem; margin-bottom: 2.5rem;
    }

    .topic {
      background: var(--white); border: 1px solid var(--border);
      font-size: 0.8rem; padding: 0.3rem 0.85rem; border-radius: 100px; color: var(--muted);
      transition: background 0.25s, border-color 0.25s;
    }

    .visit-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--accent); color: #fff;
      text-decoration: none; padding: 0.9rem 2rem;
      border-radius: 100px; font-size: 0.9rem; font-weight: 500;
      transition: background 0.18s;
    }
    .visit-btn:hover { background: #0f2519; }
    [data-theme="dark"] .visit-btn:hover { background: #3a8060; }
    .visit-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    footer { text-align: center; padding: 1.5rem; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-logo">Simon Sunuwar</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon active" id="lightIcon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </span>
        <span class="theme-toggle-icon" id="darkIcon">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </span>
      </button>
    </div>
  </nav>

  <main class="main">
    <p class="eyebrow">Writing</p>
    <h1>The <em>blog</em></h1>
    <p class="desc">Notes on sound engineering, web development, computers, and whatever else is on my mind.</p>

    <div class="topics" role="list" aria-label="Blog topics">
      <span class="topic" role="listitem">Live Sound Engineer</span>
      <span class="topic" role="listitem">AV Technician</span>
      <span class="topic" role="listitem">Audio &amp; Sound</span>
      <span class="topic" role="listitem">Web Dev</span>
      <span class="topic" role="listitem">Media operator</span>
      <span class="topic" role="listitem">Broadcast operator</span>
    </div>
    
    <a href="https://blog.simonsunuwar.com.np/" target="_blank" rel="noopener noreferrer" class="visit-btn">
      Read the blog
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </main>

  <footer>© 2026 Simon Sunuwar</footer>

  <script>
    const toggle = document.getElementById('themeToggle');
    const lightIcon = document.getElementById('lightIcon');
    const darkIcon = document.getElementById('darkIcon');
    const html = document.documentElement;

    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.setAttribute('data-theme', 'dark');
      lightIcon.classList.remove('active');
      darkIcon.classList.add('active');
    }

    toggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        lightIcon.classList.add('active');
        darkIcon.classList.remove('active');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        lightIcon.classList.remove('active');
        darkIcon.classList.add('active');
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
